services:
  - type: web
    name: angular-auth-boilerplate
    runtime: static
    buildCommand: cd frontend && npm install && chmod +x node_modules/.bin/ng && node_modules/.bin/ng build --configuration production
    staticPublishPath: frontend/dist/angular-auth-boilerplate/browser
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html